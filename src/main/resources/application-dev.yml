# ================= 开发环境配置 =================
server:
  port: 8010

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/positioning?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

# MyBatis Plus 配置
mybatis-plus:
  configuration:
    # SQL 日志输出（开发环境启用，生产环境关闭）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 驼峰命名自动映射
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      # 主键自增策略
      id-type: auto

# 物联云平台配置
iot:
  platform:
    app-id: zx20260707155447
    app-key: 777fcc695baf9efec8b2b31288bb9be5
    base-url: http://zy.zyllz.com:8898/iot/api

