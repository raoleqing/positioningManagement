<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>定位器年费管理平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --primary: #0d6efd; --success: #198754; --warning: #ffc107; --danger: #dc3545; --gray: #6c757d; }
        body { background: #f5f7fb; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
        .navbar { background: linear-gradient(135deg, #1a73e8, #0d47a1); box-shadow: 0 2px 8px rgba(0,0,0,.15); }
        .navbar-brand { color: #fff!important; font-weight: 600; font-size: 1.25rem; }
        .nav-tabs { border-bottom: 2px solid #e0e0e0; margin-bottom: 20px; }
        .nav-tabs .nav-link { border: none; color: #666; font-weight: 500; padding: 12px 24px; border-radius: 8px 8px 0 0; margin-right: 2px; }
        .nav-tabs .nav-link.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: transparent; }
        .nav-tabs .nav-link:hover:not(.active) { color: var(--primary); background: rgba(13,110,253,.05); }
        .card { border: none; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.06); margin-bottom: 20px; }
        .card-header { background: #fff; border-bottom: 1px solid #f0f0f0; font-weight: 600; padding: 16px 20px; border-radius: 12px 12px 0 0!important; }
        .badge { padding: 4px 10px; border-radius: 6px; font-weight: 500; }
        .table th { font-weight: 600; color: #555; border-bottom-width: 1px; white-space: nowrap; }
        .btn-sm { border-radius: 6px; font-weight: 500; }
        .stat-card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
        .stat-card .stat-value { font-size: 2rem; font-weight: 700; }
        .stat-card .stat-label { color: #888; font-size: .85rem; margin-top: 4px; }
        .filter-bar { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
        .filter-bar .form-group { margin-bottom: 0; }
        .filter-bar label { font-size: .8rem; color: #888; margin-bottom: 2px; }
        .pagination { margin-top: 16px; }
        .tab-content { padding: 0; }
        .log-timeline { position: relative; padding-left: 24px; }
        .log-timeline::before { content: ''; position: absolute; left: 8px; top: 0; bottom: 0; width: 2px; background: #e0e0e0; }
        .log-item { position: relative; margin-bottom: 16px; }
        .log-item::before { content: ''; position: absolute; left: -20px; top: 5px; width: 10px; height: 10px; border-radius: 50%; background: var(--primary); }
        .log-item.error::before { background: var(--danger); }
        .log-item .log-time { font-size: .75rem; color: #999; }
        .log-item .log-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: .75rem; margin-right: 6px; }
        .modal-backdrop.show { opacity: .3; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-success { background: #d4edda; color: #155724; }
        .status-failed { background: #f8d7da; color: #721c24; }
        .status-retrying { background: #cce5ff; color: #004085; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark"><div class="container-fluid"><span class="navbar-brand"><i class="bi bi-geo-alt-fill me-2"></i>定位器年费管理平台</span></div></nav>

<div class="container-fluid mt-3">
    <ul class="nav nav-tabs" id="mainTabs" role="tablist">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-orders" type="button">订单管理</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-exception" type="button">充值异常处理</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-reconciliation" type="button">对账管理</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-predeposit" type="button">预存款管理</button></li>
    </ul>

    <div class="tab-content">
        <!-- === 订单管理 TAB === -->
        <div class="tab-pane fade show active" id="tab-orders">
            <div class="card"><div class="card-header"><i class="bi bi-list-check me-2"></i>订单列表</div><div class="card-body">
                    <div class="filter-bar mb-3">
                        <div class="form-group"><label>设备ID</label><input id="f-deviceId" class="form-control form-control-sm" placeholder="设备ID"></div>
                        <div class="form-group"><label>用户ID</label><input id="f-userId" class="form-control form-control-sm" placeholder="用户ID"></div>
                        <div class="form-group"><label>订单号</label><input id="f-orderNo" class="form-control form-control-sm" placeholder="订单号"></div>
                        <div class="form-group"><label>支付状态</label><select id="f-payStatus" class="form-select form-select-sm"><option value="">全部</option><option value="PENDING">待支付</option><option value="PAID">已支付</option><option value="PAY_FAILED">支付失败</option></select></div>
                        <div class="form-group"><label>充值状态</label><select id="f-rechargeStatus" class="form-select form-select-sm"><option value="">全部</option><option value="PENDING">待充值</option><option value="SUCCESS">充值成功</option><option value="FAILED">充值失败</option></select></div>
                        <div class="form-group"><label>开始时间</label><input id="f-startTime" type="datetime-local" class="form-control form-control-sm"></div>
                        <div class="form-group"><label>结束时间</label><input id="f-endTime" type="datetime-local" class="form-control form-control-sm"></div>
                        <div class="form-group"><button class="btn btn-primary btn-sm" onclick="loadOrders(1)">查询</button></div>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead><tr><th>订单号</th><th>用户</th><th>设备</th><th>金额</th><th>支付状态</th><th>充值状态</th><th>通知状态</th><th>重试次数</th><th>创建时间</th><th>操作</th></tr></thead>
                            <tbody id="orders-tbody"></tbody>
                        </table>
                    </div>
                    <div id="orders-pagination" class="d-flex justify-content-center"></div>
            </div></div>
        </div>

        <!-- === 异常处理 TAB === -->
        <div class="tab-pane fade" id="tab-exception">
            <div class="card"><div class="card-header"><i class="bi bi-exclamation-triangle me-2"></i>失败订单处理</div><div class="card-body">
                    <button class="btn btn-danger btn-sm mb-3" onclick="retryAll()"><i class="bi bi-arrow-repeat me-1"></i>一键重试所有失败订单</button>
                    <div class="table-responsive">
                        <table class="table table-hover"><thead><tr><th>订单号</th><th>设备</th><th>金额</th><th>错误信息</th><th>重试次数</th><th>操作</th></tr></thead><tbody id="failed-orders-tbody"></tbody></table>
                    </div>
            </div></div>
            <div class="card"><div class="card-header"><i class="bi bi-pencil-square me-2"></i>设备有效期修正</div><div class="card-body">
                    <div class="row g-2 align-items-end mb-3">
                        <div class="col-auto"><label class="form-label">设备ID</label><input id="v-deviceId" class="form-control form-control-sm" placeholder="输入设备ID"></div>
                        <div class="col-auto"><label class="form-label">新有效期至</label><input id="v-validTo" type="date" class="form-control form-control-sm"></div>
                        <div class="col-auto"><label class="form-label">修正原因</label><input id="v-reason" class="form-control form-control-sm" placeholder="修正原因"></div>
                        <div class="col-auto"><button class="btn btn-primary btn-sm" onclick="updateValidity()">提交修正</button></div>
                    </div>
                    <div id="validity-info"></div>
                    <h6 class="mt-3">修正历史</h6>
                    <div id="validity-logs"></div>
            </div></div>
        </div>

        <!-- === 对账管理 TAB === -->
        <div class="tab-pane fade" id="tab-reconciliation">
            <div class="card"><div class="card-header"><i class="bi bi-journal-check me-2"></i>对账报告</div><div class="card-body">
                    <div class="filter-bar mb-3">
                        <div class="form-group"><label>开始日期</label><input id="r-startDate" type="date" class="form-control form-control-sm"></div>
                        <div class="form-group"><label>结束日期</label><input id="r-endDate" type="date" class="form-control form-control-sm"></div>
                        <div class="form-group"><label>状态</label><select id="r-status" class="form-select form-select-sm"><option value="">全部</option><option value="PENDING">待处理</option><option value="RESOLVED">已处理</option></select></div>
                        <div class="form-group"><button class="btn btn-primary btn-sm" onclick="loadReports(1)">查询</button></div>
                        <div class="form-group"><button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#generateReportModal">生成对账报告</button></div>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover"><thead><tr><th>报告编号</th><th>对账日期</th><th>总笔数</th><th>匹配笔数</th><th>差异笔数</th><th>总金额</th><th>差异金额</th><th>状态</th><th>创建时间</th><th>操作</th></tr></thead><tbody id="reports-tbody"></tbody></table>
                    </div>
                    <div id="reports-pagination" class="d-flex justify-content-center"></div>
            </div></div>
        </div>

        <!-- === 预存款管理 TAB === -->
        <div class="tab-pane fade" id="tab-predeposit">
            <div class="row mb-3">
                <div class="col-md-3"><div class="stat-card"><div class="stat-label">当前余额</div><div class="stat-value text-primary" id="p-balance">--</div></div></div>
                <div class="col-md-3"><div class="stat-card"><div class="stat-label">累计充值</div><div class="stat-value text-success" id="p-totalDeposit">--</div></div></div>
                <div class="col-md-3"><div class="stat-card"><div class="stat-label">累计消耗</div><div class="stat-value text-danger" id="p-totalConsume">--</div></div></div>
                <div class="col-md-3"><div class="stat-card"><div class="stat-label">账户状态</div><div class="stat-value" id="p-status" style="font-size:1.2rem;">--</div></div></div>
            </div>
            <div class="card"><div class="card-header"><i class="bi bi-list-ol me-2"></i>消耗明细</div><div class="card-body">
                    <div class="table-responsive"><table class="table table-hover"><thead><tr><th>类型</th><th>订单号</th><th>金额</th><th>操作前余额</th><th>操作后余额</th><th>备注</th><th>时间</th></tr></thead><tbody id="records-tbody"></tbody></table></div>
            </div></div>
            <div class="card"><div class="card-header"><i class="bi bi-bell me-2"></i>低余额告警配置</div><div class="card-body">
                    <div class="row g-2 align-items-end">
                        <div class="col-auto"><label class="form-label">告警阈值(元)</label><input id="alert-threshold" type="number" step="0.01" class="form-control form-control-sm"></div>
                        <div class="col-auto"><label class="form-label">通知手机号</label><input id="alert-phone" class="form-control form-control-sm"></div>
                        <div class="col-auto"><label class="form-label">通知邮箱</label><input id="alert-email" class="form-control form-control-sm"></div>
                        <div class="col-auto"><div class="form-check"><input id="alert-enabled" type="checkbox" class="form-check-input" checked><label class="form-check-label">启用告警</label></div></div>
                        <div class="col-auto"><button class="btn btn-primary btn-sm" onclick="saveAlertConfig()">保存配置</button></div>
                    </div>
            </div></div>
        </div>
    </div>
</div>

<!-- 订单日志模态框 -->
<div class="modal fade" id="logModal" tabindex="-1"><div class="modal-dialog modal-lg"><div class="modal-content"><div class="modal-header"><h5 class="modal-title">订单操作日志</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><div class="log-timeline" id="log-content"></div></div></div></div></div>

<!-- 对账差异详情模态框 -->
<div class="modal fade" id="diffModal" tabindex="-1"><div class="modal-dialog modal-xl"><div class="modal-content"><div class="modal-header"><h5 class="modal-title">对账差异明细</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><div class="table-responsive"><table class="table table-hover"><thead><tr><th>订单号</th><th>运营商订单号</th><th>金额</th><th>我方状态</th><th>运营商状态</th><th>差异类型</th><th>差异描述</th><th>处理状态</th><th>操作</th></tr></thead><tbody id="diff-tbody"></tbody></table></div></div></div></div></div>

<!-- 生成对账报告模态框 -->
<div class="modal fade" id="generateReportModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5 class="modal-title">生成对账报告</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><div class="mb-3"><label class="form-label">对账日期</label><input type="date" id="gen-report-date" class="form-control"></div></div><div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">取消</button><button class="btn btn-primary" onclick="generateReport()">生成</button></div></div></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    const API = '/*[[@{/}]]*/';

    function ajax(method, url, data) {
        return fetch(API + url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: data ? JSON.stringify(data) : undefined
        }).then(r => r.json());
    }

    function statusBadge(s) { const map={PENDING:'warning',SUCCESS:'success',FAILED:'danger',PAID:'success',PAY_FAILED:'danger',REFUNDED:'secondary',RETRYING:'info',RESOLVED:'success',PROCESSING:'info',CLOSED:'secondary'}; return `<span class="badge bg-${map[s]||'secondary'}">${s||'--'}</span>`; }
    function formatDate(d) { return d ? new Date(d).toLocaleString('zh-CN') : '--'; }
    function formatMoney(m) { return m ? '￥'+Number(m).toFixed(2) : '￥0.00'; }

    // ===== 订单管理 =====
    let ordersPage = 1;
    function loadOrders(page) {
        ordersPage = page; const params = new URLSearchParams();
        ['deviceId','userId','orderNo','payStatus','rechargeStatus'].forEach(k=>{ let v=document.getElementById('f-'+k).value; if(v) params.append(k,v); });
        ['startTime','endTime'].forEach(k=>{ let v=document.getElementById('f-'+k).value; if(v) params.append(k,v.replace('T',' ')+':00'); });
        params.append('pageNum',page); params.append('pageSize',10);
        ajax('GET','/order/list?'+params.toString()).then(res=>{
            if(res.code!==200) return alert(res.msg);
            let html=''; res.data.records.forEach(o=>{
                html+=`<tr><td><small>${o.orderNo||'--'}</small></td><td>${o.userName||o.userId||'--'}</td><td>${o.deviceNo||o.deviceId||'--'}</td><td>${formatMoney(o.amount)}</td><td>${statusBadge(o.payStatus)}</td><td>${statusBadge(o.rechargeStatus)}</td><td>${statusBadge(o.notifyStatus)}</td><td>${o.retryCount||0}</td><td>${formatDate(o.createTime)}</td><td><button class="btn btn-info btn-sm" onclick="showLogs(${o.id})">日志</button> <button class="btn btn-warning btn-sm" onclick="retryOrder(${o.id})" ${o.rechargeStatus!=='FAILED'?'disabled':''}>重试</button></td></tr>`;
            });
            document.getElementById('orders-tbody').innerHTML=html||'<tr><td colspan="10" class="text-center text-muted">暂无数据</td></tr>';
            let pg=''; for(let i=1;i<=Math.ceil(res.data.total/10);i++) pg+=`<li class="page-item ${i===page?'active':''}"><a class="page-link" href="#" onclick="loadOrders(${i})">${i}</a></li>`;
            document.getElementById('orders-pagination').innerHTML=pg?`<ul class="pagination pagination-sm">${pg}</ul>`:'';
        });
    }

    function showLogs(orderId) {
        ajax('GET','/order/'+orderId+'/logs').then(res=>{
            let html=''; (res.data||[]).forEach(l=>{
                let cls=l.logLevel==='ERROR'?'error':''; let badgeCls=l.logLevel==='ERROR'?'bg-danger':'bg-primary';
                html+=`<div class="log-item ${cls}"><div class="log-time">${formatDate(l.createTime)}</div><span class="log-badge ${badgeCls} text-white">${l.logType}</span><strong>${l.title||''}</strong><div class="text-muted small mt-1">${l.content||l.operator||''}</div></div>`;
            });
            document.getElementById('log-content').innerHTML=html||'<p class="text-muted">暂无日志</p>';
            new bootstrap.Modal(document.getElementById('logModal')).show();
        });
    }

    function retryOrder(orderId) {
        if(!confirm('确认重试该订单？')) return;
        ajax('POST','/order/'+orderId+'/retry?operator=ADMIN').then(res=>{ alert(res.msg); loadOrders(ordersPage); loadFailedOrders(); });
    }

    // ===== 异常处理 =====
    function loadFailedOrders() {
        ajax('GET','/order/list?rechargeStatus=FAILED&pageSize=100').then(res=>{
            let html=''; (res.data.records||[]).forEach(o=>{
                html+=`<tr><td>${o.orderNo}</td><td>${o.deviceNo||o.deviceId}</td><td>${formatMoney(o.amount)}</td><td><small class="text-danger">${o.errorMsg||'--'}</small></td><td>${o.retryCount}/${o.maxRetryCount}</td><td><button class="btn btn-warning btn-sm" onclick="retryOrder(${o.id})">重试</button></td></tr>`;
            });
            document.getElementById('failed-orders-tbody').innerHTML=html||'<tr><td colspan="6" class="text-center text-muted">暂无失败订单</td></tr>';
        });
    }

    function retryAll() {
        if(!confirm('确认一键重试所有失败订单？')) return;
        ajax('POST','/order/retry-all?operator=ADMIN').then(res=>{ alert(res.msg); loadFailedOrders(); });
    }

    function updateValidity() {
        let deviceId=document.getElementById('v-deviceId').value;
        let validTo=document.getElementById('v-validTo').value;
        let reason=document.getElementById('v-reason').value;
        if(!deviceId||!validTo||!reason) return alert('请填写完整信息');
        ajax('POST','/order/validity/update?operator=ADMIN',{deviceId:Number(deviceId),validTo,reason}).then(res=>{
            if(res.code===200) alert('修正成功');
            else alert(res.msg);
            loadValidityLogs(deviceId);
        });
    }

    function loadValidityLogs(deviceId) {
        if(!deviceId) return;
        ajax('GET','/order/validity/'+deviceId+'/logs').then(res=>{
            let html='<table class="table table-sm"><thead><tr><th>设备编号</th><th>原截止日</th><th>新截止日</th><th>原因</th><th>操作人</th><th>时间</th></tr></thead><tbody>';
            (res.data||[]).forEach(l=>{
                html+=`<tr><td>${l.deviceNo||l.deviceId}</td><td>${l.oldValidTo||'--'}</td><td>${l.newValidTo||'--'}</td><td>${l.reason}</td><td>${l.operator}</td><td>${formatDate(l.createTime)}</td></tr>`;
            });
            document.getElementById('validity-logs').innerHTML=html+'</tbody></table>';
        });
        ajax('GET','/order/validity/'+deviceId).then(res=>{
            if(res.code===200&&res.data) {
                document.getElementById('validity-info').innerHTML=`<div class="alert alert-info">设备 ${res.data.deviceNo||res.data.deviceId}: 有效期至 ${res.data.validTo||'--'} (剩余 ${res.data.remainingDays??'--'} 天)</div>`;
            }
        });
    }

    // ===== 对账管理 =====
    let reportsPage=1;
    function loadReports(page) {
        reportsPage=page; const params=new URLSearchParams();
        ['startDate','endDate'].forEach(k=>{ let v=document.getElementById('r-'+k).value; if(v) params.append('reportDate'+k.charAt(0).toUpperCase()+k.slice(1),v); });
        let s=document.getElementById('r-status').value; if(s) params.append('status',s);
        params.append('pageNum',page); params.append('pageSize',10);
        ajax('GET','/reconciliation/reports?'+params.toString()).then(res=>{
            let html=''; (res.data.records||[]).forEach(r=>{
                html+=`<tr><td>${r.reportNo}</td><td>${r.reportDate}</td><td>${r.totalCount}</td><td>${r.matchCount}</td><td>${r.diffCount}</td><td>${formatMoney(r.totalAmount)}</td><td>${formatMoney(r.diffAmount)}</td><td>${statusBadge(r.status)}</td><td>${formatDate(r.createTime)}</td><td><button class="btn btn-info btn-sm" onclick="showDiffs(${r.id})">查看差异</button> <button class="btn btn-success btn-sm" onclick="regenerateReport('${r.reportDate}')">重新生成</button></td></tr>`;
            });
            document.getElementById('reports-tbody').innerHTML=html||'<tr><td colspan="10" class="text-center text-muted">暂无数据</td></tr>';
            let pg=''; for(let i=1;i<=Math.ceil(res.data.total/10);i++) pg+=`<li class="page-item ${i===page?'active':''}"><a class="page-link" href="#" onclick="loadReports(${i})">${i}</a></li>`;
            document.getElementById('reports-pagination').innerHTML=pg?`<ul class="pagination pagination-sm">${pg}</ul>`:'';
        });
    }

    function generateReport() {
        let date=document.getElementById('gen-report-date').value;
        if(!date) return alert('请选择日期');
        ajax('POST','/reconciliation/generate?operator=ADMIN',{reportDate:date}).then(res=>{
            alert('生成成功');
            bootstrap.Modal.getInstance(document.getElementById('generateReportModal')).hide();
            loadReports(1);
        });
    }

    function regenerateReport(date) {
        if(!confirm('确认重新生成 '+date+' 的对账报告？')) return;
        ajax('POST','/reconciliation/reports/regenerate?reportDate='+date+'&operator=ADMIN').then(res=>{ alert('重新生成成功'); loadReports(1); });
    }

    function showDiffs(reportId) {
        ajax('GET','/reconciliation/reports/'+reportId+'/details?pageSize=100').then(res=>{
            let html=''; (res.data.records||[]).forEach(d=>{
                if(d.diffType==='NO_DIFF') return;
                html+=`<tr><td>${d.orderNo}</td><td>${d.externalOrderNo||'--'}</td><td>${formatMoney(d.amount)}</td><td>${d.ourStatus}</td><td>${d.externalStatus}</td><td><span class="badge bg-warning">${d.diffType}</span></td><td>${d.diffDesc||''}</td><td>${statusBadge(d.processStatus)}</td><td><button class="btn btn-success btn-sm" onclick="markDiffResolved(${d.id},${reportId})">标记已处理</button> <button class="btn btn-secondary btn-sm" onclick="markDiffIgnored(${d.id},${reportId})">忽略</button></td></tr>`;
            });
            document.getElementById('diff-tbody').innerHTML=html||'<tr><td colspan="9" class="text-center text-muted">无差异明细</td></tr>';
            new bootstrap.Modal(document.getElementById('diffModal')).show();
        });
    }

    function markDiffResolved(detailId,reportId) {
        ajax('PUT','/reconciliation/details/'+detailId+'/status?processStatus=RESOLVED&processRemark=已核实处理&operator=ADMIN').then(res=>{ alert('已标记'); showDiffs(reportId); });
    }

    function markDiffIgnored(detailId,reportId) {
        ajax('PUT','/reconciliation/details/'+detailId+'/status?processStatus=IGNORED&processRemark=已知差异忽略&operator=ADMIN').then(res=>{ alert('已忽略'); showDiffs(reportId); });
    }

    // ===== 预存款管理 =====
    function loadPreDeposit() {
        ajax('GET','/predeposit/account').then(res=>{
            if(res.code===200&&res.data) {
                document.getElementById('p-balance').textContent=formatMoney(res.data.balance);
                document.getElementById('p-totalDeposit').textContent=formatMoney(res.data.totalDeposit);
                document.getElementById('p-totalConsume').textContent=formatMoney(res.data.totalConsume);
                document.getElementById('p-status').textContent=res.data.status||'--';
            }
        });
        ajax('GET','/predeposit/records?pageSize=50').then(res=>{
            let html=''; (res.data||[]).forEach(r=>{
                html+=`<tr><td><span class="badge ${r.type==='CONSUME'?'bg-warning':'bg-success'}">${r.type}</span></td><td>${r.orderNo||'--'}</td><td>${formatMoney(r.amount)}</td><td>${formatMoney(r.balanceBefore)}</td><td>${formatMoney(r.balanceAfter)}</td><td>${r.remark||''}</td><td>${formatDate(r.createTime)}</td></tr>`;
            });
            document.getElementById('records-tbody').innerHTML=html||'<tr><td colspan="7" class="text-center text-muted">暂无记录</td></tr>';
        });
        ajax('GET','/predeposit/alert-config/1').then(res=>{
            if(res.code===200&&res.data) {
                document.getElementById('alert-threshold').value=res.data.alertThreshold||500;
                document.getElementById('alert-phone').value=res.data.alertPhone||'';
                document.getElementById('alert-email').value=res.data.alertEmail||'';
                document.getElementById('alert-enabled').checked=res.data.alertEnabled===1;
            }
        });
    }

    function saveAlertConfig() {
        let data={accountId:1,alertThreshold:Number(document.getElementById('alert-threshold').value),alertEnabled:document.getElementById('alert-enabled').checked?1:0,alertPhone:document.getElementById('alert-phone').value,alertEmail:document.getElementById('alert-email').value};
        ajax('PUT','/predeposit/alert-config',data).then(res=>{ alert(res.code===200?'保存成功':'保存失败: '+res.msg); });
    }

    // 初始化
    document.addEventListener('DOMContentLoaded',()=>{
        loadOrders(1);
        loadPreDeposit();
    });
    document.getElementById('mainTabs').addEventListener('shown.bs.tab',e=>{
        if(e.target.getAttribute('data-bs-target')==='#tab-exception') loadFailedOrders();
        if(e.target.getAttribute('data-bs-target')==='#tab-reconciliation') loadReports(1);
        if(e.target.getAttribute('data-bs-target')==='#tab-predeposit') loadPreDeposit();
    });
</script>
</body>
</html>
